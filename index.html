<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HUDKO MASTER PRO - FULL ANALYSIS</title>
    
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-database-compat.js"></script>

    <style>
        :root { --bg: #0f172a; --card: #1e293b; --acc: #38bdf8; --gold: #fbbf24; --win: #22c55e; --loss: #ef4444; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 10px; font-size: 12px; }
        .section-title { background: var(--acc); color: black; padding: 10px; text-align: center; font-weight: bold; margin-top: 15px; border-radius: 5px; text-transform: uppercase; }
        .card { background: var(--card); border-radius: 10px; padding: 15px; margin-top: 10px; border: 1px solid #334155; }
        .item-list { background: #020617; padding: 8px; border-radius: 5px; margin-top: 5px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #334155; }
        .btn-sm { padding: 8px 12px; border-radius: 4px; border: none; cursor: pointer; font-size: 11px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; background: #020617; color: white; border: 1px solid #475569; box-sizing: border-box; }
        
        .master-box { background: #1e293b; padding: 15px; border-radius: 10px; border: 2px solid var(--acc); margin-top: 10px; text-align: center; }
        .switch-group { display: flex; gap: 10px; margin-top: 10px; }
        .switch-btn { flex: 1; padding: 12px; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        .btn-on { background: var(--win); color: white; }
        .btn-off { background: var(--loss); color: white; }
        
        @keyframes blink-red { 0%, 100% { background: #450a0a; } 50% { background: #ef4444; } }
        @keyframes blink-green { 0%, 100% { background: #064e3b; } 50% { background: #22c55e; } }
        .risk-high { animation: blink-red 1.5s infinite; color: white; }
        .risk-safe { animation: blink-green 2s infinite; color: white; }
        .risk-med { background: #422006; color: #fbbf24; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 8px; border: 1px solid #334155; text-align: center; }
        .acc-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px; }
        .acc-stat { background: #020617; padding: 10px; border-radius: 8px; border: 1px solid #334155; text-align: center; }
    </style>
</head>
<body>

    <div style="display: flex; justify-content: space-between; align-items: center; padding: 5px;">
        <b style="color: var(--gold); font-size: 16px;">HUDKO MASTER ADMIN</b>
        <input type="date" id="acc_date" style="width: auto; padding: 5px;" onchange="refreshUI()">
    </div>

    <div class="master-box">
        <b style="color: var(--acc);">MAIN SITE CONTROL</b>
        <div id="site_status_display" style="margin: 10px 0; font-size: 13px; padding: 5px; border-radius: 4px;">LOADING...</div>
        <div class="switch-group">
            <button class="switch-btn btn-on" onclick="updateSiteStatus(true, 'SITE IS OPEN')">ALL OPEN</button>
            <button class="switch-btn btn-off" onclick="updateSiteStatus(false, 'SITE IS CLOSED')">ALL CLOSE</button>
        </div>
    </div>

    <div class="section-title">📒 ಅಕೌಂಟ್ಸ್ ರಿಪೋರ್ಟ್</div>
    <div class="card">
        <div class="acc-summary">
            <div class="acc-stat"><small>Total Col.</small><br><b id="acc_total" style="color: var(--gold);">₹0</b></div>
            <div class="acc-stat"><small>Comm.</small><br><b id="acc_comm" style="color: #fb7185;">₹0</b></div>
            <div class="acc-stat"><small>Win Pay</small><br><b id="acc_win_pay" style="color: #60a5fa;">₹0</b></div>
            <div class="acc-stat"><small>Net Profit</small><br><b id="acc_net" style="color: var(--win);">₹0</b></div>
        </div>
        <div style="max-height: 150px; overflow-y: auto;">
            <table>
                <thead><tr><th>Agent</th><th>Col.</th><th>Comm.</th><th>Win</th></tr></thead>
                <tbody id="acc_body"></tbody>
            </table>
        </div>
    </div>

    <div class="section-title">🎡 ಮಾರ್ಕೆಟ್ ಮ್ಯಾನೇಜ್ಮೆಂಟ್</div>
    <div class="card">
        <input type="text" id="new_mkt_name" placeholder="Market Name">
        <div style="display: flex; gap: 5px;">
            <div style="flex:1"><small>Open</small><input type="time" id="new_mkt_open"></div>
            <div style="flex:1"><small>Close</small><input type="time" id="new_mkt_close"></div>
        </div>
        <button class="btn-sm" style="background:var(--acc); color:black; width:100%;" onclick="addMarket()">ADD MARKET</button>
        <div id="market_list_div" style="margin-top:10px;"></div>
    </div>

    <div class="section-title">📊 ಲೋಡ್ ಅನಾಲಿಸಿಸ್</div>
    <div class="card">
        <select id="load_mkt_select" onchange="refreshUI()"></select>
        <div style="display:flex; gap:2px; overflow-x:auto; margin:10px 0;">
            <button class="btn-sm" onclick="setTab('OPEN')">OPEN</button>
            <button class="btn-sm" onclick="setTab('CLOSE')">CLOSE</button>
            <button class="btn-sm" onclick="setTab('JODI')">JODI</button>
            <button class="btn-sm" onclick="setTab('OPEN_PN')">O-PN</button>
            <button class="btn-sm" onclick="setTab('CLOSE_PN')">C-PN</button>
        </div>
        <table>
            <thead><tr><th>NO</th><th>AMT</th><th>AGENTS</th></tr></thead>
            <tbody id="load_body"></tbody>
        </table>
    </div>

    <div class="section-title">🏆 ರಿಸಲ್ಟ್ ಘೋಷಣೆ</div>
    <div class="card">
        <select id="res_mkt"></select>
        <select id="res_typ">
            <option value="OPEN">OPEN</option>
            <option value="CLOSE">CLOSE</option>
            <option value="JODI">JODI</option>
            <option value="OPEN_PN">OPEN PANNA</option>
            <option value="CLOSE_PN">CLOSE PANNA</option>
        </select>
        <input type="text" id="res_num" placeholder="Winner Number">
        <button onclick="declareResult()" class="btn-sm" style="background:var(--win); color:black; width:100%; padding:12px;">DECLARE RESULT</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCbVfz8ynzI6WwENNXk9syRXTfq2VdwbLg",
            authDomain: "manipal-app-270b3.firebaseapp.com",
            databaseURL: "https://manipal-app-270b3-default-rtdb.firebaseio.com",
            projectId: "manipal-app-270b3",
            storageBucket: "manipal-app-270b3.firebasestorage.app",
            messagingSenderId: "563904839457",
            appId: "1:563904839457:web:2f88db438d36f37750c860"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        let markets = []; let agents = {}; let rawBets = {}; let curTab = "OPEN"; let settings = {ratio: 9};

        // Update Site Status
        function updateSiteStatus(isOpen, msg) {
            db.ref('settings').update({ siteOpen: isOpen, siteNotice: msg });
            alert("Updated!");
        }

        db.ref('settings').on('value', snap => {
            let s = snap.val() || {};
            settings = s;
            let display = document.getElementById('site_status_display');
            display.innerText = s.siteOpen ? "STATUS: ACTIVE (OPEN)" : "STATUS: LOCKED (CLOSED)";
            display.style.background = s.siteOpen ? "#064e3b" : "#450a0a";
        });

        // Market Data
        db.ref('markets').on('value', snap => {
            let data = snap.val() || {};
            markets = Object.keys(data).map(k => ({id: k, ...data[k]}));
            document.getElementById('market_list_div').innerHTML = markets.map(m => 
                `<div class="item-list"><span>${m.name}</span><button onclick="db.ref('markets/${m.id}').remove()">X</button></div>`
            ).join('');
            let ops = markets.map(m => `<option value="${m.name}">${m.name}</option>`).join('');
            document.getElementById('load_mkt_select').innerHTML = ops;
            document.getElementById('res_mkt').innerHTML = ops;
            refreshUI();
        });

        function addMarket() {
            let n = document.getElementById('new_mkt_name').value.toUpperCase();
            let o = document.getElementById('new_mkt_open').value;
            let c = document.getElementById('new_mkt_close').value;
            if(n && o && c) db.ref('markets/'+n).set({name:n, open:o, close:c});
        }

        db.ref('agents').on('value', snap => { agents = snap.val() || {}; refreshUI(); });
        db.ref('bets').on('value', snap => { rawBets = snap.val() || {}; refreshUI(); });

        function setTab(t) { curTab = t; refreshUI(); }

        function refreshUI() {
            let mkt = document.getElementById('load_mkt_select').value;
            let date = document.getElementById('acc_date').value;
            let load = {}; let accData = {}; 
            let totalCol = 0; let totalWinPay = 0; let totalComm = 0;

            // Load Initialization
            if (curTab === 'OPEN' || curTab === 'CLOSE') for (let i=0; i<=9; i++) load[i] = {amt:0, agts:[]};
            if (curTab === 'JODI') for (let i=0; i<=99; i++) load[i.toString().padStart(2,'0')] = {amt:0, agts:[]};

            Object.values(rawBets).forEach(b => {
                if(b.date === date) {
                    // Accounts Logic
                    if(!accData[b.agent]) accData[b.agent] = {col:0, win:0, comm:0};
                    accData[b.agent].col += b.amt;
                    totalCol += b.amt;

                    let commAmt = (b.amt * (agents[b.agent] || 0)) / 100;
                    accData[b.agent].comm += commAmt;
                    totalComm += commAmt;

                    if(b.status === "WIN") {
                        let w = b.amt * (settings.ratio || 9);
                        accData[b.agent].win += w;
                        totalWinPay += w;
                    }

                    // Load Logic
                    if(b.mkt === mkt && b.typ === curTab) {
                        if(!load[b.num]) load[b.num] = {amt:0, agts:[]};
                        load[b.num].amt += b.amt;
                        if(!load[b.num].agts.includes(b.agent)) load[b.num].agts.push(b.agent);
                    }
                }
            });

            // Summary UI
            document.getElementById('acc_total').innerText = "₹"+totalCol;
            document.getElementById('acc_comm').innerText = "₹"+totalComm.toFixed(0);
            document.getElementById('acc_win_pay').innerText = "₹"+totalWinPay;
            document.getElementById('acc_net').innerText = "₹"+(totalCol - totalComm - totalWinPay).toFixed(0);

            document.getElementById('acc_body').innerHTML = Object.keys(accData).map(id => 
                `<tr><td>${id}</td><td>₹${accData[id].col}</td><td>₹${accData[id].comm.toFixed(0)}</td><td>₹${accData[id].win}</td></tr>`
            ).join('');

            // Load Analysis UI
            let sorted = Object.keys(load).sort((a,b) => load[b].amt - load[a].amt);
            document.getElementById('load_body').innerHTML = sorted.map(n => {
                let a = load[n].amt;
                let ags = load[n].agts.join(', ');
                let cls = a > 1000 ? "risk-high" : (a > 0 ? "risk-med" : "risk-safe");
                return `<tr class="${cls}"><td><b>${n}</b></td><td>₹${a}</td><td style="font-size:9px">${ags || '-'}</td></tr>`;
            }).join('');
        }

        function declareResult() {
            let m = document.getElementById('res_mkt').value;
            let t = document.getElementById('res_typ').value;
            let n = document.getElementById('res_num').value.trim();
            let d = document.getElementById('acc_date').value;
            if(!m || !n) return;
            Object.keys(rawBets).forEach(id => {
                let b = rawBets[id];
                if(b.mkt===m && b.typ===t && b.num===n && b.date===d) db.ref('bets/'+id+'/status').set("WIN");
            });
            alert("Results Updated!");
        }
        document.getElementById('acc_date').valueAsDate = new Date();
    </script>
</body>
</html>
